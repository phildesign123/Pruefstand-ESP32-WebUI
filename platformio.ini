[platformio]
build_dir = C:\.pio\pruefstand

[env:esp32-wrover]
platform = espressif32
; esp32wrover aktiviert automatisch PSRAM (SPI PSRAM, QSPI)
board = esp32dev
framework = arduino

; Partition-Tabelle & Filesystem
board_build.partitions = partitions.csv
board_build.filesystem = littlefs

; Upload & Monitor
monitor_speed = 115200
upload_speed = 921600

; Build-Flags
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1
    -DASYNCWEBSERVER_REGEX

; Bibliotheken
lib_deps =
    https://github.com/mathieucarbou/ESPAsyncWebServer
    https://github.com/mathieucarbou/AsyncTCP
    bblanchon/ArduinoJson @ ^7.0.0
    teemuatlut/TMCStepper @ ^0.7.3

; Alle Quelldateien einbeziehen
build_src_filter = +<*>

; ── Gemeinsame Basis-Einstellungen für Test-Environments ─────
[test_base]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = partitions.csv
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    "-I${PROJECT_DIR}/src"
lib_deps =
    teemuatlut/TMCStepper @ ^0.7.3

; ── Hotend-Test (Sensor, Heizer, Lüfter, PID) ────────────────
[env:test-hotend]
extends = test_base
build_src_filter =
    -<**>
    +<hotend/>
    +<../test/hotend_test/>

; ── Motor-Test (RMT, TMC2208 UART, E-Steps-Kalibrierung) ─────
[env:test-motor]
extends = test_base
build_src_filter =
    -<**>
    +<motor/>
    +<../test/motor_test/>

; ── Wägezellen-Test (NAU7802, Filter, Tara, Kalibrierung) ────
[env:test-loadcell]
extends = test_base
build_src_filter =
    -<**>
    +<load_cell/>
    +<../test/load_cell_test/>

; ── Datenlogger-Test (SD-Karte, Ringpuffer, CSV, CLI) ─────────
; Mock-Funktionen für Hotend/Motor/Wägezelle in test/datalog_test/
[env:test-datalog]
extends = test_base
build_src_filter =
    -<**>
    +<datalog/>
    +<../test/datalog_test/>
